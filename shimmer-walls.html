<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shimmer Walls – Morel's Exquisite Designs</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f5eeea;
  font-family: Georgia, 'Times New Roman', serif;
  color: #3a2e2e;
}

.page-wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 48px 32px 80px;
}

/* "Click Here for Requests" — matches site exactly */
.sw-toplink {
  text-align: center;
  font-family: Georgia, serif;
  font-size: 1.1rem;
  color: #3a2e2e;
  margin-bottom: 28px;
}
.sw-toplink a {
  color: #3a2e2e;
  font-style: italic;
  text-decoration: underline;
  font-weight: normal;
}
.sw-toplink a:hover { color: #c49a8a; }

/* PAGE TITLE — matches bold serif "Backdrops" heading */
.sw-page-title {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 2rem;
  font-weight: 700;
  color: #3a2e2e;
  text-align: center;
  margin-bottom: 40px;
  letter-spacing: 0.01em;
}

/* 3-COLUMN GRID — matches backdrops page */
.sw-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px 24px;
  margin-bottom: 40px;
}
@media (max-width: 700px) {
  .sw-grid { grid-template-columns: repeat(2, 1fr); gap: 20px 12px; }
}
@media (max-width: 440px) {
  .sw-grid { grid-template-columns: 1fr; }
}

/* CARD — matches MED product card exactly */
.sw-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  cursor: pointer;
}

.sw-card-img-wrap {
  width: 100%;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  margin-bottom: 14px;
  background: #e8ddd8;
}
.sw-card-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: left center;
  display: block;
  transition: transform 0.4s;
}
.sw-card:hover .sw-card-img-wrap img { transform: scale(1.04); }

/* Product name — matches "8' x 8' Pink Flower Wall" style */
.sw-card-name {
  font-family: Georgia, serif;
  font-size: 0.88rem;
  font-weight: 700;
  color: #3a2e2e;
  margin-bottom: 5px;
  line-height: 1.4;
}

/* Price — matches "Price: $550" style */
.sw-card-price {
  font-family: Georgia, serif;
  font-size: 0.82rem;
  color: #3a2e2e;
  margin-bottom: 6px;
}

/* Request link — matches lowercase "request" underline style */
.sw-card-req {
  font-family: Georgia, serif;
  font-size: 0.82rem;
  color: #3a2e2e;
  text-decoration: underline;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  font-style: italic;
}
.sw-card-req:hover { color: #c49a8a; }

/* DETAIL PANEL */
.sw-detail {
  display: none;
  background: #fff;
  border: 1px solid #e0d4cf;
  margin-bottom: 36px;
  overflow: hidden;
}
.sw-detail.open { display: flex; }

.sw-detail-img {
  flex: 0 0 42%;
  position: relative;
  min-height: 320px;
  background: #e8ddd8;
  overflow: hidden;
}
.sw-detail-img img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: left center;
  display: block;
}

.sw-detail-info {
  flex: 1;
  padding: 36px 32px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: #f5eeea;
}

.sw-detail-name {
  font-family: Georgia, serif;
  font-size: 1rem;
  font-weight: 700;
  color: #3a2e2e;
  margin-bottom: 6px;
}
.sw-detail-price {
  font-family: Georgia, serif;
  font-size: 0.88rem;
  color: #3a2e2e;
  margin-bottom: 14px;
}
.sw-detail-desc {
  font-family: Georgia, serif;
  font-size: 0.8rem;
  color: #7a6a66;
  line-height: 1.8;
  margin-bottom: 18px;
}
.sw-detail-specs {
  margin-bottom: 22px;
  border-top: 1px solid #e0d4cf;
  padding-top: 14px;
}
.sw-spec-row {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
  border-bottom: 1px solid #ede4e0;
  font-family: Georgia, serif;
  font-size: 0.76rem;
}
.sw-spec-k { color: #b0988e; font-style: italic; }
.sw-spec-v { color: #3a2e2e; }

.sw-detail-actions { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.sw-req-link {
  font-family: Georgia, serif;
  font-size: 0.82rem;
  color: #3a2e2e;
  text-decoration: underline;
  font-style: italic;
  cursor: pointer;
  text-decoration-color: #3a2e2e;
}
.sw-req-link:hover { color: #c49a8a; }
.sw-close-link {
  font-family: Georgia, serif;
  font-size: 0.76rem;
  color: #b0988e;
  background: none;
  border: none;
  cursor: pointer;
  font-style: italic;
  padding: 0;
}
.sw-close-link:hover { color: #7a6a66; }

@media (max-width: 640px) {
  .sw-detail.open { flex-direction: column; }
  .sw-detail-img { flex: none; min-height: 220px; }
  .sw-detail-info { padding: 22px 18px; }
}
</style>
</head>

const grid       = document.getElementById('swGrid');
const detail     = document.getElementById('swDetail');
const detailImg  = document.getElementById('swDetailImg');
const detailInfo = document.getElementById('swDetailInfo');

WALLS.forEach(wall => {
  const card = document.createElement('div');
  card.className = 'sw-card';
  card.innerHTML = `
    <div class="sw-card-img-wrap">
      <img src="${wall.img}" alt="${wall.name}" loading="lazy">
    </div>
    <div class="sw-card-name">${wall.name}</div>
    <div class="sw-card-price">Price: $310</div>
`;
  card.addEventListener('click', () => openDetail(wall));
  grid.appendChild(card);
});

function openDetail(wall) {
  detailImg.src = wall.img;
  detailImg.alt = wall.name;

  const specsHTML = Object.entries(wall.specs).map(([k,v]) =>
    `<div class="sw-spec-row"><span class="sw-spec-k">${k}</span><span class="sw-spec-v">${v}</span></div>`
  ).join('');

  detailInfo.innerHTML = `
    <div class="sw-detail-name">${wall.name}</div>
    <div class="sw-detail-price">Price: $310</div>
    <p class="sw-detail-desc">${wall.desc}</p>
    <div class="sw-detail-specs">${specsHTML}</div>
    <div class="sw-detail-actions">
      <a class="sw-req-link" href="https://www.mexquisitedesigns.com/contact">Add to My Event →</a>
      <button class="sw-close-link" onclick="closeDetail()">close ✕</button>
    </div>`;

  detail.classList.add('open');
  detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeDetail() {
  detail.classList.remove('open');
}
</script>
